[build]
  command = "node generate-indexes.js"
  publish = "."

# ─── Cabeceras de seguridad y cache ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/_data/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Redirects CRÍTICOS para Netlify Identity ─────────────────────────────────
#
# Netlify Identity manda emails con links tipo:
#   https://tu-sitio.netlify.app/#invite_token=xxxxx
#   https://tu-sitio.netlify.app/#recovery_token=xxxxx
#
# El token va en el HASH (#), no en el path, así que la página raíz "/"
# necesita tener el netlify-identity-widget para procesarlo.
# Tu index.html ya lo tiene. Solo necesitamos que /admin también lo resuelva.

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
